name: Pre-Check (Symbols & Strings)

on:
  push:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: 1

      - name: Check R.string symbols (fast, no compile needed)
        run: |
          python3 << 'PYEOF'
          import re, sys
          from pathlib import Path
          from collections import defaultdict

          ROOT = Path(".")
          STRINGS_XML = ROOT / "TMessagesProj/src/main/res/values/strings.xml"
          STRINGS_NEKO = ROOT / "TMessagesProj/src/main/res/values/strings_neko.xml"
          STRINGS_ACC  = ROOT / "TMessagesProj/src/main/res/values/strings_accessibility.xml"

          # 1. Collect every defined name from ALL string files
          all_string_files = [f for f in [STRINGS_XML, STRINGS_NEKO, STRINGS_ACC] if f.exists()]
          defined = set()
          for f in all_string_files:
              for m in re.finditer(r'name="([^"]+)"', f.read_text(encoding="utf-8")):
                  defined.add(m.group(1))
          print(f"[INFO] All string files combined define {len(defined)} unique entries")

          # 2. Scan all Java/Kotlin files for ONLY "R.string.XXX" literals
          ONLY_RSTRING = re.compile(r'\bR\.string\.(\w+)')

          refs = defaultdict(list)
          java_root = ROOT / "TMessagesProj/src/main/java"
          if java_root.exists():
              for ext in ("*.java", "*.kt"):
                  for path in java_root.rglob(ext):
                      try:
                          lines = path.read_text(encoding="utf-8", errors="ignore").splitlines()
                      except Exception:
                          continue
                      rel = str(path.relative_to(ROOT))
                      for lineno, line in enumerate(lines, 1):
                          for m in ONLY_RSTRING.finditer(line):
                              refs[m.group(1)].append((rel, lineno))

          print(f"[INFO] Found {len(refs)} unique R.string.XXX references")

          # 3. Find missing
          missing = {k: v for k, v in refs.items() if k not in defined}

          if not missing:
              print("\n✅ [PASS] Every R.string.XXX is defined — build will not fail on missing symbols!")
              sys.exit(0)

          by_file = defaultdict(list)
          for name, locs in missing.items():
              for (f, ln) in locs:
                  by_file[f].append((ln, name))

          print(f"\n❌ [FAIL] {len(missing)} R.string.XXX references have NO matching entry:\n")
          for fname in sorted(by_file):
              hits = sorted(by_file[fname])
              print(f"  📄 {fname}")
              for (ln, name) in hits[:8]:
                  print(f"      line {ln:5d}: R.string.{name}")
              if len(hits) > 8:
                  print(f"      ... +{len(hits)-8} more in this file")

          print(f"\n📋 [FIX] Add these {len(missing)} entries to strings.xml:")
          for name in sorted(missing):
              print(f'    <string name="{name}">TODO</string>')

          sys.exit(1)
          PYEOF

      - name: Check XML well-formedness (all string files)
        if: always()
        run: |
          python3 << 'PYEOF'
          import xml.etree.ElementTree as ET, sys
          from pathlib import Path

          files = [
              "TMessagesProj/src/main/res/values/strings.xml",
              "TMessagesProj/src/main/res/values/strings_neko.xml",
              "TMessagesProj/src/main/res/values/strings_accessibility.xml",
          ]
          failed = False
          for f in files:
              p = Path(f)
              if not p.exists():
                  print(f"⚠️  [SKIP] {f} not found")
                  continue
              try:
                  ET.parse(f)
                  print(f"✅ [PASS] {f} is valid XML")
              except ET.ParseError as e:
                  print(f"❌ [FAIL] {f} parse error: {e}")
                  failed = True
          if failed:
              sys.exit(1)
          PYEOF

      - name: Check for duplicate string names (within each file AND across files)
        if: always()
        run: |
          python3 << 'PYEOF'
          import re, sys
          from pathlib import Path
          from collections import Counter, defaultdict

          files = {
              "strings.xml":              "TMessagesProj/src/main/res/values/strings.xml",
              "strings_neko.xml":         "TMessagesProj/src/main/res/values/strings_neko.xml",
              "strings_accessibility.xml":"TMessagesProj/src/main/res/values/strings_accessibility.xml",
          }

          failed = False

          # ── Within-file duplicates ──────────────────────────────────────────
          all_names = defaultdict(list)   # name -> [file, file, ...]
          for label, path in files.items():
              p = Path(path)
              if not p.exists():
                  continue
              names = re.findall(r'name="([^"]+)"', p.read_text(encoding="utf-8"))
              counts = Counter(names)
              dupes = {k: v for k, v in counts.items() if v > 1}
              if dupes:
                  print(f"❌ [FAIL] Within-file duplicates in {label} ({len(dupes)} names):")
                  for name, count in sorted(dupes.items()):
                      print(f"    {name}  (×{count})")
                  failed = True
              else:
                  print(f"✅ [PASS] No within-file duplicates in {label}")
              for name in set(names):
                  all_names[name].append(label)

          # ── Cross-file duplicates ───────────────────────────────────────────
          cross = {name: files_list for name, files_list in all_names.items() if len(files_list) > 1}
          if cross:
              print(f"\n❌ [FAIL] {len(cross)} string name(s) defined in MULTIPLE files")
              print("   Android merges all values/ XML files — duplicates cause a build failure!\n")
              for name in sorted(cross):
                  print(f"    {name}  →  {' + '.join(sorted(cross[name]))}")
              print(f"\n💡 [FIX] Remove the duplicate entries from strings.xml")
              print(f"   (keep the definitions in strings_neko.xml / strings_accessibility.xml)")
              failed = True
          else:
              print("✅ [PASS] No cross-file duplicate string names")

          if failed:
              sys.exit(1)
          PYEOF
