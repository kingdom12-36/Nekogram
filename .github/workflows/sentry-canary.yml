name: Sentry Canary (Crash Test)

# PURPOSE: Build a tiny 1-file Android app in ~3 min, crash it on the emulator,
#          and confirm Sentry receives the event. Proves the Sentry pipeline works
#          independently of the full Nekogram build.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  canary:
    runs-on: ubuntu-latest

    steps:
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Build minimal Sentry crash app
        env:
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        run: |
          mkdir -p canary/app/src/main/java/io/sentry/canary
          mkdir -p canary/app/src/main/res/values

          # ── settings.gradle ──────────────────────────────────────────────
          cat > canary/settings.gradle << 'EOF'
          pluginManagement {
              repositories { google(); mavenCentral(); gradlePluginPortal() }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories { google(); mavenCentral() }
          }
          rootProject.name = "SentryCanary"
          include ':app'
          EOF

          # ── root build.gradle ─────────────────────────────────────────────
          cat > canary/build.gradle << 'EOF'
          plugins {
              id 'com.android.application' version '8.2.2' apply false
              id 'org.jetbrains.kotlin.android' version '1.9.22' apply false
              id 'io.sentry.android.gradle' version '4.4.1' apply false
          }
          EOF

          # ── app/build.gradle ──────────────────────────────────────────────
          cat > canary/app/build.gradle << 'EOF'
          plugins {
              id 'com.android.application'
              id 'org.jetbrains.kotlin.android'
          }
          android {
              namespace 'io.sentry.canary'
              compileSdk 34
              defaultConfig {
                  applicationId 'io.sentry.canary'
                  minSdk 26
                  targetSdk 34
                  versionCode 1
                  versionName '1.0'
              }
              buildTypes {
                  release {
                      minifyEnabled false
                  }
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
              kotlinOptions { jvmTarget = '17' }
          }
          dependencies {
              implementation 'io.sentry:sentry-android:7.9.0'
          }
          EOF

          # ── AndroidManifest.xml ────────────────────────────────────────────
          cat > canary/app/src/main/AndroidManifest.xml << MANIFEST
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application
                  android:label="SentryCanary"
                  android:theme="@style/Theme.AppCompat">
                  <meta-data android:name="io.sentry.dsn" android:value="${SENTRY_DSN}" />
                  <meta-data android:name="io.sentry.environment" android:value="canary-ci" />
                  <meta-data android:name="io.sentry.send-default-pii" android:value="false" />
                  <activity
                      android:name=".MainActivity"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          MANIFEST

          # ── res/values/styles.xml ─────────────────────────────────────────
          cat > canary/app/src/main/res/values/styles.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="Theme.AppCompat" parent="android:Theme.Material.Light"/>
          </resources>
          EOF

          # ── MainActivity.kt ────────────────────────────────────────────────
          cat > canary/app/src/main/java/io/sentry/canary/MainActivity.kt << 'EOF'
          package io.sentry.canary
          import android.app.Activity
          import android.os.Bundle
          import android.os.Handler
          import android.os.Looper
          import io.sentry.Sentry

          class MainActivity : Activity() {
              override fun onCreate(savedInstanceState: Bundle?) {
                  super.onCreate(savedInstanceState)
                  // Give Sentry 2 s to init, then crash deliberately
                  Handler(Looper.getMainLooper()).postDelayed({
                      Sentry.captureMessage("Canary CI test — pipeline working ✅")
                      // Now throw a hard crash so logcat also shows it
                      throw RuntimeException("SentryCanary intentional crash — CI pipeline test")
                  }, 2000)
              }
          }
          EOF

          # ── gradle wrapper ─────────────────────────────────────────────────
          cd canary
          gradle wrapper --gradle-version 8.4 --distribution-type bin -q
          chmod +x gradlew

          echo "✅ Project ready — building..."
          ./gradlew :app:assembleRelease \
            --no-daemon \
            --no-configuration-cache \
            -q

          APK=$(find . -path "*/outputs/apk/release/*.apk" | head -1)
          cp "$APK" ../canary.apk
          cd ..
          ls -lh canary.apk
          echo "✅ APK built: $(du -sh canary.apk | cut -f1)"

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Write canary test script
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        run: |
          TOKEN_VAL="${SENTRY_AUTH_TOKEN}"
          cat > /tmp/canary.sh << HEADER
          #!/usr/bin/env bash
          set -euo pipefail
          SENTRY_TOKEN="$TOKEN_VAL"
          HEADER
          cat >> /tmp/canary.sh << 'BODY'
          ADB="$ANDROID_HOME/platform-tools/adb"
          PKG="io.sentry.canary"

          echo "━━━ CANARY CRASH TEST ━━━"
          $ADB install -r canary.apk && echo "✅ Installed"

          # Grab Sentry issue count BEFORE launch so we can detect new ones
          BEFORE=$(curl -s \
            -H "Authorization: Bearer $SENTRY_TOKEN" \
            "https://us.sentry.io/api/0/projects/sham-19/android/issues/?query=is:unresolved&limit=50" \
            | grep -c '"id"' | tr -d '[:space:]')
          BEFORE="${BEFORE:-0}"
          echo "Sentry issues before launch: $BEFORE"

          $ADB logcat -c
          $ADB logcat > /tmp/canary_logcat.txt 2>&1 &
          LOGCAT_PID=$!

          echo "Launching canary app..."
          $ADB shell am start -n "$PKG/.MainActivity" \
            -a android.intent.action.MAIN -c android.intent.category.LAUNCHER
          echo "Waiting 30 s for crash + Sentry flush..."
          sleep 30

          kill $LOGCAT_PID 2>/dev/null || true

          echo ""
          echo "━━━ Logcat crash evidence ━━━"
          grep -E "SentryCanary|FATAL|RuntimeException|io.sentry.canary" \
            /tmp/canary_logcat.txt | head -30 || echo "(nothing)"

          echo ""
          echo "━━━ Sentry check ━━━"
          AFTER_RESP=$(curl -s \
            -H "Authorization: Bearer $SENTRY_TOKEN" \
            "https://us.sentry.io/api/0/projects/sham-19/android/issues/?query=is:unresolved&limit=50")
          AFTER=$(echo "$AFTER_RESP" | grep -c '"id"' | tr -d '[:space:]')
          AFTER="${AFTER:-0}"
          echo "Sentry issues after launch: $AFTER"
          echo "$AFTER_RESP" | grep -oP '(?<="title":")[^"]+' | head -10 || true

          echo ""
          if [ "${AFTER}" -gt "${BEFORE}" ]; then
            echo "🟢 CANARY PASSED — Sentry received the crash! (${BEFORE} → ${AFTER} issues)"
            echo "👉 https://sham-19.sentry.io/issues/"
            exit 0
          else
            echo "🔴 CANARY FAILED — Sentry issue count unchanged (${BEFORE} → ${AFTER})"
            echo "Check: DSN correct? Network reachable? Logcat below:"
            tail -50 /tmp/canary_logcat.txt
            exit 1
          fi
          BODY
          chmod +x /tmp/canary.sh

      - name: Run canary on emulator
        uses: reactivecircus/android-emulator-runner@v2
        timeout-minutes: 10
        with:
          api-level: 30
          target: default
          arch: x86_64
          profile: pixel_3a
          ram-size: 1536M
          heap-size: 256M
          emulator-options: -no-window -no-audio -no-snapshot -gpu swiftshader_indirect
          disable-animations: true
          script: bash /tmp/canary.sh
