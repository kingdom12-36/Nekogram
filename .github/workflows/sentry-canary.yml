name: Sentry Canary (Crash Test)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  canary:
    runs-on: ubuntu-latest

    steps:
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Build minimal Sentry crash app
        env:
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        run: |
          mkdir -p canary/app/src/main/java/io/sentry/canary
          mkdir -p canary/app/src/main/res/values

          cat > canary/settings.gradle << 'EOF'
          pluginManagement {
              repositories { google(); mavenCentral(); gradlePluginPortal() }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories { google(); mavenCentral() }
          }
          rootProject.name = "SentryCanary"
          include ':app'
          EOF

          cat > canary/build.gradle << 'EOF'
          plugins {
              id 'com.android.application' version '8.2.2' apply false
              id 'org.jetbrains.kotlin.android' version '1.9.22' apply false
          }
          EOF

          cat > canary/gradle.properties << 'EOF'
          android.useAndroidX=true
          android.enableJetifier=true
          org.gradle.jvmargs=-Xmx2g -XX:MaxMetaspaceSize=512m
          org.gradle.daemon=false
          EOF

          cat > canary/app/build.gradle << 'EOF'
          plugins {
              id 'com.android.application'
              id 'org.jetbrains.kotlin.android'
          }
          android {
              namespace 'io.sentry.canary'
              compileSdk 34
              defaultConfig {
                  applicationId 'io.sentry.canary'
                  minSdk 26
                  targetSdk 34
                  versionCode 1
                  versionName '1.0'
              }
              buildTypes {
                  debug { minifyEnabled false }
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
              kotlinOptions { jvmTarget = '17' }
          }
          dependencies {
              implementation 'io.sentry:sentry-android:7.9.0'
          }
          EOF

          cat > canary/app/src/main/AndroidManifest.xml << MANIFEST
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application
                  android:label="SentryCanary"
                  android:theme="@style/Theme.AppCompat">
                  <meta-data android:name="io.sentry.dsn" android:value="${SENTRY_DSN}" />
                  <meta-data android:name="io.sentry.environment" android:value="canary-ci" />
                  <activity
                      android:name=".MainActivity"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          MANIFEST

          cat > canary/app/src/main/res/values/styles.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="Theme.AppCompat" parent="android:Theme.Material.Light"/>
          </resources>
          EOF

          cat > canary/app/src/main/java/io/sentry/canary/MainActivity.kt << 'EOF'
          package io.sentry.canary
          import android.app.Activity
          import android.os.Bundle
          import android.os.Handler
          import android.os.Looper
          import io.sentry.Sentry

          class MainActivity : Activity() {
              override fun onCreate(savedInstanceState: Bundle?) {
                  super.onCreate(savedInstanceState)
                  Handler(Looper.getMainLooper()).postDelayed({
                      Sentry.captureMessage("Canary CI — pipeline check")
                      throw RuntimeException("SentryCanary intentional crash — CI test")
                  }, 2000)
              }
          }
          EOF

          # Create Android debug keystore so assembleDebug produces a signed APK
          mkdir -p ~/.android
          keytool -genkey -v -keystore ~/.android/debug.keystore \
            -alias androiddebugkey -keyalg RSA -keysize 2048 -validity 30 \
            -storepass android -keypass android \
            -dname "CN=Android Debug,O=Android,C=US" 2>/dev/null || true
          echo "✅ Debug keystore ready"

          cd canary
          gradle wrapper --gradle-version 8.4 --distribution-type bin -q
          chmod +x gradlew
          ./gradlew :app:assembleDebug --no-daemon --no-configuration-cache -q

          APK=$(find . -path "*/outputs/apk/debug/*.apk" | head -1)
          cp "$APK" ../canary.apk
          cd ..
          ls -lh canary.apk
          echo "✅ APK built"

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Write canary test script
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        run: |
          TOKEN_VAL="${SENTRY_AUTH_TOKEN}"
          cat > /tmp/canary.sh << HEADER
          #!/usr/bin/env bash
          set -uo pipefail
          SENTRY_TOKEN="$TOKEN_VAL"
          HEADER
          cat >> /tmp/canary.sh << 'BODY'
          ADB="$ANDROID_HOME/platform-tools/adb"
          PKG="io.sentry.canary"

          echo "━━━ CANARY CRASH TEST ━━━"

          $ADB install -r canary.apk && echo "✅ APK installed"

          # Count Sentry issues BEFORE launch (|| echo "0" prevents set -e exit on 0 matches)
          BEFORE_RESP=$(curl -s \
            -H "Authorization: Bearer $SENTRY_TOKEN" \
            "https://us.sentry.io/api/0/projects/sham-19/android/issues/?query=is:unresolved&limit=50" || echo "")
          BEFORE=$(echo "$BEFORE_RESP" | grep -o '"id"' | wc -l | tr -d '[:space:]')
          echo "Sentry issues BEFORE launch: $BEFORE"

          $ADB logcat -c || true
          $ADB logcat > /tmp/canary_logcat.txt 2>&1 &
          LOGCAT_PID=$!

          echo "Launching canary app..."
          $ADB shell am start -n "$PKG/.MainActivity" \
            -a android.intent.action.MAIN -c android.intent.category.LAUNCHER || true
          echo "Waiting 30 s for crash + Sentry flush..."
          sleep 30

          kill $LOGCAT_PID 2>/dev/null || true

          echo ""
          echo "━━━ Crash evidence in logcat ━━━"
          grep -E "SentryCanary|RuntimeException|FATAL|io.sentry.canary" \
            /tmp/canary_logcat.txt 2>/dev/null | head -20 || echo "(none)"

          echo ""
          echo "━━━ Sentry check ━━━"
          AFTER_RESP=$(curl -s \
            -H "Authorization: Bearer $SENTRY_TOKEN" \
            "https://us.sentry.io/api/0/projects/sham-19/android/issues/?query=is:unresolved&limit=50" || echo "")
          AFTER=$(echo "$AFTER_RESP" | grep -o '"id"' | wc -l | tr -d '[:space:]')
          echo "Sentry issues AFTER launch: $AFTER"
          echo "$AFTER_RESP" | grep -oP '(?<="title":")[^"]+' | head -5 || true

          echo ""
          if [ "${AFTER}" -gt "${BEFORE}" ]; then
            echo "🟢 CANARY PASSED — Sentry received the crash! ($BEFORE → $AFTER issues)"
            echo "👉 https://sham-19.sentry.io/issues/"
            exit 0
          else
            echo "🔴 CANARY FAILED — Sentry count unchanged ($BEFORE → $AFTER)"
            echo "Full logcat:"
            tail -60 /tmp/canary_logcat.txt
            exit 1
          fi
          BODY
          chmod +x /tmp/canary.sh

      - name: Run canary on emulator
        uses: reactivecircus/android-emulator-runner@v2
        timeout-minutes: 10
        with:
          api-level: 30
          target: default
          arch: x86_64
          profile: pixel_3a
          ram-size: 1536M
          heap-size: 256M
          emulator-options: -no-window -no-audio -no-snapshot -gpu swiftshader_indirect
          disable-animations: true
          script: bash /tmp/canary.sh
