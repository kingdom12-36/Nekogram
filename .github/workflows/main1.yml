name: Build OctoGram (Auto-Key Factory)

on:
  workflow_dispatch:
  push:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      apk-name: ${{ steps.stage.outputs.apk-name }}
      app-pkg: ${{ steps.patch.outputs.app-pkg }}

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          lfs: true
          fetch-depth: 1

      - name: Checkout Submodules LFS Files
        run: git submodule foreach --recursive 'git lfs pull'

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Gradle (Safe Cache)
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-cleanup: on-success
          gradle-home-cache-includes: |
            caches/modules-2
            caches/transforms-3
            wrapper
          gradle-home-cache-excludes: |
            caches/build-cache-*
            caches/journal-*
            caches/configuration-cache

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Verify Essential Tools
        run: |
          git lfs version
          sed --version

      - name: Linkit Key Factory
        run: |
          KEY_NAME="Linkit"
          PASSWORD="Linkit"
          sudo mkdir -p /home/octogram/keys
          sudo chmod -R 777 /home/octogram
          keytool -genkey -v \
            -keystore /home/octogram/keys/octogram-key.jks \
            -alias $KEY_NAME -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass $PASSWORD -keypass $PASSWORD \
            -dname "CN=Linkit, OU=Dev, O=LinkitFortress, L=Global, S=Security, C=US"

      - name: Patch Package Name & arm64 Only
        id: patch
        run: |
          PKG="org.linkit.octogram${GITHUB_RUN_NUMBER}"
          echo "Package for this build: $PKG"
          sed -i "s/^APP_PACKAGE=.*/APP_PACKAGE=$PKG/" gradle.properties
          grep APP_PACKAGE gradle.properties
          sed -i "s/include 'armeabi-v7a', 'arm64-v8a', 'x86', 'x86_64'/include 'arm64-v8a'/" TMessagesProj_App/build.gradle
          sed -i 's/include "armeabi-v7a", "arm64-v8a", "x86", "x86_64"/include "arm64-v8a"/' TMessagesProj_App/build.gradle
          TARGET_JSON="TMessagesProj_App/google-services.json"
          if [ -f "$TARGET_JSON" ]; then
            sed -i "s/\"package_name\": \"[^\"]*\"/\"package_name\": \"$PKG\"/g" "$TARGET_JSON"
          fi
          echo "APP_PKG=$PKG" >> $GITHUB_ENV
          echo "app-pkg=$PKG" >> $GITHUB_OUTPUT

      - name: Generate google-services.json
        run: |
          TARGET_JSON="TMessagesProj_App/google-services.json"
          if [ ! -f "$TARGET_JSON" ]; then
            echo "google-services.json not found — generating a stub..."
            cat > "$TARGET_JSON" << 'JSON_EOF'
          {
            "project_info": {
              "project_number": "000000000000",
              "project_id": "linkit-octogram",
              "storage_bucket": "linkit-octogram.appspot.com"
            },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:000000000000:android:0000000000000000000000",
                  "android_client_info": {
                    "package_name": "$PKG"
                  }
                },
                "oauth_client": [],
                "api_key": [
                  {
                    "current_key": "AIzaSyDummyKey_Linkit_000000000000000000000"
                  }
                ],
                "services": {
                  "appinvite_service": {
                    "other_platform_oauth_client": []
                  }
                }
              }
            ],
            "configuration_version": "1"
          }
          JSON_EOF
            sed -i "s/\$PKG/${APP_PKG}/g" "$TARGET_JSON"
            echo "Stub google-services.json created for ${APP_PKG}"
          else
            echo "google-services.json already exists."
          fi

      - name: Run Repo Setup Script
        env:
          TERM: xterm-256color
          FORCE_COLOR: "1"
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
          APP_ID: ${{ env.APP_PKG }}
          APP_NAME: "OctoGram Linkit"
          APP_DOWNLOAD_URL: "https://telegram.org/dl"
          APP_SOURCES_URL: "https://github.com/kingdom12-36/OctoGram"
        run: |
          chmod +x scripts/*.sh 2>/dev/null || true
          mkdir -p /home/runner/bin
          printf '#!/bin/bash\nexit 0\n' > /home/runner/bin/tput
          chmod +x /home/runner/bin/tput
          export PATH=/home/runner/bin:$PATH
          MAPS_KEY="${{ secrets.MAPS_API_KEY }}"
          [ -z "$MAPS_KEY" ] && MAPS_KEY="AIzaSyDummyKey_Linkit"
          {
            echo "storeFile=/home/octogram/keys/octogram-key.jks"
            echo "storePassword=Linkit"
            echo "keyAlias=Linkit"
            echo "keyPassword=Linkit"
            echo "mapsApiKey=$MAPS_KEY"
            echo "apiId=$TELEGRAM_API_ID"
            echo "apiHash=$TELEGRAM_API_HASH"
          } > local.properties
          echo "=== local.properties (credentials redacted) ==="
          grep -v "apiId\|apiHash\|storePassword\|keyPassword" local.properties
          echo "apiId=<set>" && echo "apiHash=<set>"
          [ -d "scripts" ] && ./scripts/setup.sh || true

      # ─────────────────────────────────────────────────────────────────
      # PRE-BUILD SANITY CHECK
      # ─────────────────────────────────────────────────────────────────
      - name: Pre-Build Sanity Check
        env:
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
        run: |
          ERRORS=0
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  PRE-BUILD SANITY CHECK"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          if [ -z "$TELEGRAM_API_ID" ]; then
            echo "❌ TELEGRAM_API_ID secret is not set"; ERRORS=$((ERRORS+1))
          elif ! echo "$TELEGRAM_API_ID" | grep -qE '^[0-9]+$'; then
            echo "❌ TELEGRAM_API_ID is not a valid integer"; ERRORS=$((ERRORS+1))
          elif [ "$TELEGRAM_API_ID" -eq 0 ]; then
            echo "❌ TELEGRAM_API_ID is 0 — native crash at launch"; ERRORS=$((ERRORS+1))
          else
            echo "✅ TELEGRAM_API_ID is set and non-zero"
          fi
          if [ -z "$TELEGRAM_API_HASH" ]; then
            echo "❌ TELEGRAM_API_HASH secret is not set"; ERRORS=$((ERRORS+1))
          elif ! echo "$TELEGRAM_API_HASH" | grep -qE '^[0-9a-fA-F]{32}$'; then
            echo "❌ TELEGRAM_API_HASH is not a 32-char hex string (len: ${#TELEGRAM_API_HASH})"; ERRORS=$((ERRORS+1))
          else
            echo "✅ TELEGRAM_API_HASH is set and looks valid"
          fi
          if [ ! -f "local.properties" ]; then
            echo "❌ local.properties not found"; ERRORS=$((ERRORS+1))
          else
            LOCAL_ID=$(grep "^apiId=" local.properties | cut -d= -f2)
            if [ -z "$LOCAL_ID" ] || [ "$LOCAL_ID" = "0" ]; then
              echo "❌ local.properties apiId is empty or 0"; ERRORS=$((ERRORS+1))
            else
              echo "✅ local.properties apiId is set"
            fi
            if ! grep -q "^apiHash=" local.properties || [ -z "$(grep "^apiHash=" local.properties | cut -d= -f2)" ]; then
              echo "❌ local.properties apiHash missing"; ERRORS=$((ERRORS+1))
            else
              echo "✅ local.properties apiHash is set"
            fi
          fi
          [ ! -f "/home/octogram/keys/octogram-key.jks" ] && { echo "❌ Keystore missing"; ERRORS=$((ERRORS+1)); } || echo "✅ Keystore exists"
          PKG_IN_GRADLE=$(grep "^APP_PACKAGE=" gradle.properties | cut -d= -f2)
          [ "$PKG_IN_GRADLE" = "tw.nekomimi.nekogram" ] && { echo "❌ APP_PACKAGE not patched"; ERRORS=$((ERRORS+1)); } || echo "✅ APP_PACKAGE: $PKG_IN_GRADLE"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          if [ "$ERRORS" -gt 0 ]; then
            echo "🚫 $ERRORS check(s) failed — aborting"
            exit 1
          else
            echo "🟢 All checks passed — proceeding to build"
          fi

      - name: Fix Gradle Properties
        run: |
          [ -f "gradle.properties" ] && sed -i '/android.enableR8/d' gradle.properties || true
          echo 'android.injected.testOnly=false' >> gradle.properties
          echo 'org.gradle.jvmargs=-Xmx6g -XX:MaxMetaspaceSize=1g -XX:+UseParallelGC -Dfile.encoding=UTF-8' >> gradle.properties
          echo 'org.gradle.parallel=true' >> gradle.properties
          echo 'org.gradle.daemon=false' >> gradle.properties

      - name: Grant Execute Permission for Gradle
        run: chmod +x gradlew

      - name: Enable Sentry Upload
        run: |
          echo 'sentry.autoUpload=true'                 >> gradle.properties
          echo 'sentry.uploadNativeSymbols=false'       >> gradle.properties
          echo 'sentry.includeSourceContext=false'      >> gradle.properties
          echo 'sentry.uploadProguardMapping=true'      >> gradle.properties
          echo 'sentry.tracingInstrumentation.enabled=false' >> gradle.properties
          echo "[Sentry] flags written:" && grep sentry gradle.properties

      - name: Build Android App
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: 'sham-19'
          SENTRY_PROJECT: 'android'
        run: |
          ./gradlew :TMessagesProj_App:assembleRelease \
            --no-configuration-cache \
            -Pandroid.injected.testOnly=false \
            -Pandroid.antlr.arguments="-w" \
            -Dorg.gradle.project.android.ndk.cflags="-w" \
            -Dorg.gradle.project.android.ndk.cppflags="-w" \
            --stacktrace

      - name: Locate & Stage APK
        id: stage
        run: |
          find . -path "*/outputs/apk*" -name "*.apk" -not -path "*/.gradle/*" 2>/dev/null | sort
          APK_PATH=$(find . -path "*/outputs/apk*" -name "*.apk" -not -path "*/.gradle/*" 2>/dev/null | grep -i "arm64" | head -1)
          [ -z "$APK_PATH" ] && APK_PATH=$(find . -path "*/outputs/apk*" -name "*.apk" -not -path "*/.gradle/*" 2>/dev/null | head -1)
          if [ -n "$APK_PATH" ]; then
            cp "$APK_PATH" OctoGram-arm64.apk
            echo "Staged: $APK_PATH"
            ls -lh OctoGram-arm64.apk
            echo "apk-name=OctoGram-arm64.apk" >> $GITHUB_OUTPUT
          else
            echo "ERROR: No signed APK found"; exit 1
          fi

      - name: Diagnose APK
        run: |
          BT="$ANDROID_HOME/build-tools/$(ls $ANDROID_HOME/build-tools | sort -V | tail -1)"
          echo "=== FILE ===" && file OctoGram-arm64.apk && ls -lh OctoGram-arm64.apk
          echo "=== PACKAGE ===" && $BT/aapt dump badging OctoGram-arm64.apk 2>&1 | grep -E "package:|testOnly|native-code|sdkVersion" || true
          echo "=== SIGNATURE ===" && $BT/apksigner verify --verbose OctoGram-arm64.apk 2>&1 | head -5 || true
          echo "=== ZIP ===" && (unzip -t OctoGram-arm64.apk > /dev/null 2>&1 && echo "ZIP valid" || echo "ZIP CORRUPT")

      - name: Upload APK as Actions Artifact
        uses: actions/upload-artifact@v4
        with:
          name: OctoGram-arm64
          path: OctoGram-arm64.apk
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────────
  # SMOKE TEST — runs an ARM64 emulator in the CI VM (no cloud auth)
  # Installs the APK, launches it, waits 20 s, checks it is still alive.
  # ─────────────────────────────────────────────────────────────────────
  smoke-test:
    runs-on: ubuntu-latest
    needs: build
    # Don't block delivery on test failure — still sends APK
    # Change to true once you're confident builds are stable
    continue-on-error: true

    steps:
      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: OctoGram-arm64

      - name: Enable KVM (hardware acceleration)
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install emulator system image (API 30 arm64)
        run: |
          sdkmanager --install \
            "system-images;android-30;google_apis;arm64-v8a" \
            "emulator" \
            "platform-tools" \
            "platforms;android-30" \
            --channel=0
          echo "no" | avdmanager create avd \
            --name smoke_avd \
            --package "system-images;android-30;google_apis;arm64-v8a" \
            --device "pixel_3a" \
            --force

      - name: Boot emulator
        timeout-minutes: 8
        run: |
          $ANDROID_HOME/emulator/emulator \
            -avd smoke_avd \
            -no-window \
            -no-audio \
            -no-snapshot \
            -gpu swiftshader_indirect \
            -memory 2048 &

          # Wait for the emulator to fully boot
          echo "Waiting for emulator boot..."
          $ANDROID_HOME/platform-tools/adb wait-for-device
          until $ANDROID_HOME/platform-tools/adb shell getprop sys.boot_completed 2>/dev/null | grep -q "1"; do
            sleep 4
          done
          echo "Emulator is ready ✅"

      - name: Install APK on emulator
        run: |
          PKG="${{ needs.build.outputs.app-pkg }}"
          echo "Installing $PKG ..."
          $ANDROID_HOME/platform-tools/adb install -r OctoGram-arm64.apk
          echo "✅ Installed"

      - name: Launch app and smoke-test for crashes
        run: |
          PKG="${{ needs.build.outputs.app-pkg }}"
          ADB="$ANDROID_HOME/platform-tools/adb"

          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  SMOKE TEST — launching $PKG"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          # Start capturing logcat (crash buffer + main) in background
          $ADB logcat -c
          $ADB logcat -b crash,main *:W > /tmp/smoke_logcat.txt 2>&1 &
          LOGCAT_PID=$!

          # Launch the app
          $ADB shell am start -n "$PKG/org.telegram.ui.LaunchActivity" \
            -a android.intent.action.MAIN \
            -c android.intent.category.LAUNCHER

          echo "Waiting 20 s to observe stability..."
          sleep 20

          # Check if the app process is alive
          ALIVE=$($ADB shell pidof "$PKG" 2>/dev/null || echo "")
          kill $LOGCAT_PID 2>/dev/null || true

          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  LOGCAT (crashes / warnings)"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          grep -E "CRASH|FATAL|died|libneko|$PKG|NativeLoader|JNI" /tmp/smoke_logcat.txt | head -40 || true

          echo ""
          if [ -n "$ALIVE" ]; then
            echo "🟢 SMOKE TEST PASSED — app is alive (pid $ALIVE) after 20 s"
            exit 0
          else
            echo "🔴 SMOKE TEST FAILED — app process not found after 20 s"
            echo ""
            echo "Full crash log:"
            cat /tmp/smoke_logcat.txt | head -80
            exit 1
          fi

  deliver:
    runs-on: ubuntu-latest
    needs: [build, smoke-test]
    # Always deliver even if smoke-test flagged an issue
    if: always() && needs.build.result == 'success'

    steps:
      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: OctoGram-arm64

      - name: Send APK to Telegram Channel
        continue-on-error: true
        env:
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
          TELEGRAM_CLIENT: ${{ secrets.TELEGRAM_CLIENT }}
          BUILD_PKG: ${{ needs.build.outputs.app-pkg }}
          BUILD_NUM: ${{ github.run_number }}
          SMOKE_RESULT: ${{ needs.smoke-test.result }}
        run: |
          pip install telethon -q
          SMOKE_ICON="✅"
          [ "$SMOKE_RESULT" != "success" ] && SMOKE_ICON="⚠️"
          python3 - << PYEOF
          import os, asyncio
          from telethon import TelegramClient
          from telethon.sessions import StringSession
          api_id   = int(os.environ['TELEGRAM_API_ID'])
          api_hash = os.environ['TELEGRAM_API_HASH']
          session  = os.environ['TELEGRAM_CLIENT']
          channel  = -1004457565242
          smoke    = os.environ.get('SMOKE_ICON', '❓')
          pkg      = os.environ.get('BUILD_PKG', 'unknown')
          num      = os.environ.get('BUILD_NUM', '?')
          caption  = f"**OctoGram Linkit — Build #{num}**\nPackage: {pkg}\nArch: arm64-v8a\nSmoke test: {smoke}"
          async def main():
              async with TelegramClient(StringSession(session), api_id, api_hash) as client:
                  await client.send_file(channel, 'OctoGram-arm64.apk', caption=caption, force_document=True)
                  print('APK sent!')
          asyncio.run(main())
          PYEOF

      - name: Publish to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SMOKE_RESULT: ${{ needs.smoke-test.result }}
        run: |
          SMOKE_ICON="✅ passed"
          [ "$SMOKE_RESULT" != "success" ] && SMOKE_ICON="⚠️ check logs"
          PKG="${{ needs.build.outputs.app-pkg }}"
          printf '## OctoGram Linkit — Build #%s\n\nPackage: `%s`\nCommit: `%s`\nSmoke test: %s\n\narm64-v8a only.' \
            "${{ github.run_number }}" "$PKG" "${{ github.sha }}" "$SMOKE_ICON" > release_notes.md
          gh release delete latest --yes 2>/dev/null || true
          git push origin :refs/tags/latest 2>/dev/null || true
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git fetch origin
          gh release create latest OctoGram-arm64.apk \
            --title "OctoGram Linkit — Build #${{ github.run_number }} — $(date -u '+%Y-%m-%d %H:%M UTC')" \
            --notes-file release_notes.md \
            --latest
