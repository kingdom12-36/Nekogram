name: Build OctoGram (Auto-Key Factory)

on:
  workflow_dispatch:
  push:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          lfs: true
          fetch-depth: 1

      - name: Checkout Submodules LFS Files
        run: git submodule foreach --recursive 'git lfs pull'

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Gradle (Safe Cache)
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-cleanup: on-success
          gradle-home-cache-includes: |
            caches/modules-2
            caches/transforms-3
            wrapper
          gradle-home-cache-excludes: |
            caches/build-cache-*
            caches/journal-*
            caches/configuration-cache

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Verify Essential Tools
        run: |
          git lfs version
          sed --version

      - name: Linkit Key Factory
        run: |
          KEY_NAME="Linkit"
          PASSWORD="Linkit"
          sudo mkdir -p /home/octogram/keys
          sudo chmod -R 777 /home/octogram
          keytool -genkey -v \
            -keystore /home/octogram/keys/octogram-key.jks \
            -alias $KEY_NAME -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass $PASSWORD -keypass $PASSWORD \
            -dname "CN=Linkit, OU=Dev, O=LinkitFortress, L=Global, S=Security, C=US"

      - name: Patch Package Name & arm64 Only
        run: |
          PKG="org.linkit.octogram${GITHUB_RUN_NUMBER}"
          echo "Package for this build: $PKG"
          sed -i "s/^APP_PACKAGE=.*/APP_PACKAGE=$PKG/" gradle.properties
          grep APP_PACKAGE gradle.properties
          sed -i "s/include 'armeabi-v7a', 'arm64-v8a', 'x86', 'x86_64'/include 'arm64-v8a'/" TMessagesProj_App/build.gradle
          sed -i 's/include "armeabi-v7a", "arm64-v8a", "x86", "x86_64"/include "arm64-v8a"/' TMessagesProj_App/build.gradle
          TARGET_JSON="TMessagesProj_App/google-services.json"
          if [ -f "$TARGET_JSON" ]; then
            sed -i "s/\"package_name\": \"[^\"]*\"/\"package_name\": \"$PKG\"/g" "$TARGET_JSON"
          fi
          echo "APP_PKG=$PKG" >> $GITHUB_ENV

      - name: Generate google-services.json
        run: |
          TARGET_JSON="TMessagesProj_App/google-services.json"
          if [ ! -f "$TARGET_JSON" ]; then
            echo "google-services.json not found — generating a stub..."
            cat > "$TARGET_JSON" << 'JSON_EOF'
          {
            "project_info": {
              "project_number": "000000000000",
              "project_id": "linkit-octogram",
              "storage_bucket": "linkit-octogram.appspot.com"
            },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:000000000000:android:0000000000000000000000",
                  "android_client_info": {
                    "package_name": "$PKG"
                  }
                },
                "oauth_client": [],
                "api_key": [
                  {
                    "current_key": "AIzaSyDummyKey_Linkit_000000000000000000000"
                  }
                ],
                "services": {
                  "appinvite_service": {
                    "other_platform_oauth_client": []
                  }
                }
              }
            ],
            "configuration_version": "1"
          }
          JSON_EOF
            sed -i "s/\$PKG/${APP_PKG}/g" "$TARGET_JSON"
            echo "Stub google-services.json created for ${APP_PKG}"
          else
            echo "google-services.json already exists."
          fi

      - name: Run Repo Setup Script
        env:
          TERM: xterm-256color
          FORCE_COLOR: "1"
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
          APP_ID: ${{ env.APP_PKG }}
          APP_NAME: "OctoGram Linkit"
          APP_DOWNLOAD_URL: "https://telegram.org/dl"
          APP_SOURCES_URL: "https://github.com/kingdom12-36/OctoGram"
        run: |
          chmod +x scripts/*.sh 2>/dev/null || true
          mkdir -p /home/runner/bin
          printf '#!/bin/bash\nexit 0\n' > /home/runner/bin/tput
          chmod +x /home/runner/bin/tput
          export PATH=/home/runner/bin:$PATH
          MAPS_KEY="${{ secrets.MAPS_API_KEY }}"
          [ -z "$MAPS_KEY" ] && MAPS_KEY="AIzaSyDummyKey_Linkit"
          {
            echo "storeFile=/home/octogram/keys/octogram-key.jks"
            echo "storePassword=Linkit"
            echo "keyAlias=Linkit"
            echo "keyPassword=Linkit"
            echo "mapsApiKey=$MAPS_KEY"
            echo "apiId=$TELEGRAM_API_ID"
            echo "apiHash=$TELEGRAM_API_HASH"
          } > local.properties
          echo "=== local.properties (credentials redacted) ==="
          grep -v "apiId\|apiHash\|storePassword\|keyPassword" local.properties
          echo "apiId=<set>" && echo "apiHash=<set>"
          [ -d "scripts" ] && ./scripts/setup.sh || true

      # ─────────────────────────────────────────────────────────────────
      # PRE-BUILD SANITY CHECK
      # Fails fast if critical credentials are missing or obviously wrong,
      # so you never waste an hour compiling an APK that will crash.
      # ─────────────────────────────────────────────────────────────────
      - name: Pre-Build Sanity Check
        env:
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
        run: |
          ERRORS=0

          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  PRE-BUILD SANITY CHECK"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          # 1. TELEGRAM_API_ID must be a non-zero integer
          if [ -z "$TELEGRAM_API_ID" ]; then
            echo "❌ TELEGRAM_API_ID secret is not set"
            ERRORS=$((ERRORS+1))
          elif ! echo "$TELEGRAM_API_ID" | grep -qE '^[0-9]+$'; then
            echo "❌ TELEGRAM_API_ID is not a valid integer: '$TELEGRAM_API_ID'"
            ERRORS=$((ERRORS+1))
          elif [ "$TELEGRAM_API_ID" -eq 0 ]; then
            echo "❌ TELEGRAM_API_ID is 0 — this will cause libneko native crash at launch"
            ERRORS=$((ERRORS+1))
          else
            echo "✅ TELEGRAM_API_ID is set and non-zero"
          fi

          # 2. TELEGRAM_API_HASH must be a non-empty 32-char hex string
          if [ -z "$TELEGRAM_API_HASH" ]; then
            echo "❌ TELEGRAM_API_HASH secret is not set"
            ERRORS=$((ERRORS+1))
          elif ! echo "$TELEGRAM_API_HASH" | grep -qE '^[0-9a-fA-F]{32}$'; then
            echo "❌ TELEGRAM_API_HASH does not look like a 32-char hex string (got length: ${#TELEGRAM_API_HASH})"
            ERRORS=$((ERRORS+1))
          else
            echo "✅ TELEGRAM_API_HASH is set and looks valid (32-char hex)"
          fi

          # 3. local.properties must exist and contain apiId + apiHash
          if [ ! -f "local.properties" ]; then
            echo "❌ local.properties not found — credentials were never written"
            ERRORS=$((ERRORS+1))
          else
            if ! grep -q "^apiId=" local.properties; then
              echo "❌ local.properties is missing 'apiId' line"
              ERRORS=$((ERRORS+1))
            else
              LOCAL_ID=$(grep "^apiId=" local.properties | cut -d= -f2)
              if [ -z "$LOCAL_ID" ] || [ "$LOCAL_ID" = "0" ]; then
                echo "❌ local.properties has apiId=$LOCAL_ID — invalid"
                ERRORS=$((ERRORS+1))
              else
                echo "✅ local.properties apiId is set and non-zero"
              fi
            fi

            if ! grep -q "^apiHash=" local.properties; then
              echo "❌ local.properties is missing 'apiHash' line"
              ERRORS=$((ERRORS+1))
            else
              LOCAL_HASH=$(grep "^apiHash=" local.properties | cut -d= -f2)
              if [ -z "$LOCAL_HASH" ] || [ "$LOCAL_HASH" = "null" ]; then
                echo "❌ local.properties has empty/null apiHash"
                ERRORS=$((ERRORS+1))
              else
                echo "✅ local.properties apiHash is set"
              fi
            fi
          fi

          # 4. Keystore must exist
          if [ ! -f "/home/octogram/keys/octogram-key.jks" ]; then
            echo "❌ Keystore not found at /home/octogram/keys/octogram-key.jks"
            ERRORS=$((ERRORS+1))
          else
            echo "✅ Keystore exists"
          fi

          # 5. APP_PACKAGE must be patched away from the upstream default
          PKG_IN_GRADLE=$(grep "^APP_PACKAGE=" gradle.properties | cut -d= -f2)
          if [ "$PKG_IN_GRADLE" = "tw.nekomimi.nekogram" ]; then
            echo "❌ APP_PACKAGE was not patched — still set to upstream 'tw.nekomimi.nekogram'"
            ERRORS=$((ERRORS+1))
          else
            echo "✅ APP_PACKAGE patched to: $PKG_IN_GRADLE"
          fi

          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          if [ "$ERRORS" -gt 0 ]; then
            echo "🚫 $ERRORS check(s) failed — aborting build to avoid a broken APK"
            exit 1
          else
            echo "🟢 All checks passed — proceeding to build"
          fi

      - name: Fix Gradle Properties
        run: |
          [ -f "gradle.properties" ] && sed -i '/android.enableR8/d' gradle.properties || true
          echo 'android.injected.testOnly=false' >> gradle.properties
          echo 'org.gradle.jvmargs=-Xmx6g -XX:MaxMetaspaceSize=1g -XX:+UseParallelGC -Dfile.encoding=UTF-8' >> gradle.properties
          echo 'org.gradle.parallel=true' >> gradle.properties
          echo 'org.gradle.daemon=false' >> gradle.properties

      - name: Grant Execute Permission for Gradle
        run: chmod +x gradlew

      - name: Enable Sentry Upload
        run: |
          echo 'sentry.autoUpload=true'                 >> gradle.properties
          echo 'sentry.uploadNativeSymbols=false'       >> gradle.properties
          echo 'sentry.includeSourceContext=false'      >> gradle.properties
          echo 'sentry.uploadProguardMapping=true'      >> gradle.properties
          echo 'sentry.tracingInstrumentation.enabled=false' >> gradle.properties
          echo "[Sentry] Optimized flags written to gradle.properties:"
          grep sentry gradle.properties

      - name: Build Android App
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: 'sham-19'
          SENTRY_PROJECT: 'android'
        run: |
          ./gradlew :TMessagesProj_App:assembleRelease \
            --no-configuration-cache \
            -Pandroid.injected.testOnly=false \
            -Pandroid.antlr.arguments="-w" \
            -Dorg.gradle.project.android.ndk.cflags="-w" \
            -Dorg.gradle.project.android.ndk.cppflags="-w" \
            --stacktrace

      - name: Locate & Stage APK
        run: |
          echo "=== Signed APKs in outputs/ ==="
          find . -path "*/outputs/apk*" -name "*.apk" -not -path "*/.gradle/*" 2>/dev/null | sort
          APK_PATH=$(find . -path "*/outputs/apk*" -name "*.apk" -not -path "*/.gradle/*" 2>/dev/null | grep -i "arm64" | head -1)
          [ -z "$APK_PATH" ] && APK_PATH=$(find . -path "*/outputs/apk*" -name "*.apk" -not -path "*/.gradle/*" 2>/dev/null | head -1)
          if [ -n "$APK_PATH" ]; then
            cp "$APK_PATH" OctoGram-arm64.apk
            echo "Staged: $APK_PATH"
            echo "APP_PKG=${APP_PKG}" >> $GITHUB_ENV
            ls -lh OctoGram-arm64.apk
          else
            echo "ERROR: No signed APK in outputs/"; exit 1
          fi

      - name: Diagnose APK
        run: |
          BT="$ANDROID_HOME/build-tools/$(ls $ANDROID_HOME/build-tools | sort -V | tail -1)"
          echo "=== FILE ===" && file OctoGram-arm64.apk && ls -lh OctoGram-arm64.apk
          echo "=== PACKAGE ===" && $BT/aapt dump badging OctoGram-arm64.apk 2>&1 | grep -E "package:|testOnly|native-code|sdkVersion" || true
          echo "=== SIGNATURE ===" && $BT/apksigner verify --verbose OctoGram-arm64.apk 2>&1 | head -5 || true
          echo "=== ZIP ===" && (unzip -t OctoGram-arm64.apk > /dev/null 2>&1 && echo "ZIP valid" || echo "ZIP CORRUPT")

          # ── POST-BUILD: verify API_ID was compiled in correctly ──────
          echo "=== API_ID VERIFICATION ==="
          unzip -p OctoGram-arm64.apk "classes*.dex" > /tmp/all_dex.bin 2>/dev/null || true
          # Search for the compiled integer 0x00000000 next to known Telegram API strings
          # Simpler: check the BuildConfig class exists and API_ID string is not "0"
          if unzip -l OctoGram-arm64.apk | grep -q "BuildConfig"; then
            echo "✅ BuildConfig class is present in APK"
          fi
          # Extract strings from dex and look for API_ID field markers
          strings /tmp/all_dex.bin 2>/dev/null | grep -i "apiId\|API_ID\|api_id" | head -10 || true
          echo "(If no API_ID string above, it was compiled as an int — normal for release builds with R8)"

      - name: Upload APK as Actions Artifact
        uses: actions/upload-artifact@v4
        with:
          name: OctoGram-arm64
          path: OctoGram-arm64.apk
          retention-days: 30

      - name: Send APK to Telegram Channel
        continue-on-error: true
        env:
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
          TELEGRAM_CLIENT: ${{ secrets.TELEGRAM_CLIENT }}
          BUILD_PKG: ${{ env.APP_PKG }}
          BUILD_NUM: ${{ github.run_number }}
        run: |
          pip install telethon -q
          echo "" | base64 -d > /tmp/tg_send.py
          python3 /tmp/tg_send.py

      - name: Publish to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          printf '## OctoGram Linkit — Build #%s\n\nPackage: %s\nCommit: %s\n\narm64-v8a only.' "${{ github.run_number }}" "$APP_PKG" "${{ github.sha }}" > release_notes.md
          gh release delete latest --yes 2>/dev/null || true
          git push origin :refs/tags/latest 2>/dev/null || true
          gh release create latest OctoGram-arm64.apk \
            --title "OctoGram Linkit — Build #${{ github.run_number }} — $(date -u '+%Y-%m-%d %H:%M UTC')" \
            --notes-file release_notes.md \
            --latest
