Name: Build OctoGram (Custom Secrets Only)

on:
  push:
    branches: [ "main", "dev", "ci" ]
    paths-ignore:
      - '**.md'
      - '.github/**'
      - '!.github/workflows/build.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      CCACHE_COMPILERCHECK: "%compiler% -dumpmachine; %compiler% -dumpversion"
      CCACHE_HARDLINK: "true"
      CCACHE_NOHASHDIR: "true"
      CCACHE_MAXSIZE: "10G"
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up ccache
        uses: hendrikmuhs/ccache-action@v1.2

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: false

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4
        with:
          packages: "build-tools;36.1.0 ndk;27.3.13750724 platforms;android-36"

      - name: Configure Gradle
        run: |
          mkdir -p ~/.gradle
          echo 'org.gradle.caching=true' >> ~/.gradle/gradle.properties
          echo 'org.gradle.parallel=true' >> ~/.gradle/gradle.properties
          echo 'org.gradle.jvmargs=-Xmx8192m -Dfile.encoding=UTF-8 -XX:+UseParallelGC' >> ~/.gradle/gradle.properties
          echo 'android.native.buildOutput=verbose' >> ~/.gradle/gradle.properties

      - name: Linkit Key Factory (Auto-Keystore)
        run: |
          KEY_NAME="Linkit"
          PASSWORD="Linkit"
          sudo mkdir -p /home/octogram/keys
          sudo chmod -R 777 /home/octogram
          keytool -genkey -v \
            -keystore /home/octogram/keys/octogram-key.jks \
            -alias $KEY_NAME -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass $PASSWORD -keypass $PASSWORD \
            -dname "CN=Linkit, OU=Dev, O=LinkitFortress, L=Global, S=Security, C=US"
          
          # ربط التوقيع التلقائي بملف السورس المتوقع
          echo "storeFile=/home/octogram/keys/octogram-key.jks" >> local.properties
          echo "storePassword=$PASSWORD" >> local.properties
          echo "keyAlias=$KEY_NAME" >> local.properties
          echo "keyPassword=$PASSWORD" >> local.properties

      - name: Configure Your Specific Secrets
        run: |
          # هنا بنحقن فقط الـ Secrets اللي كانت عندك بالسكريبت القديم بدون أي إضافات جديدة
          echo "apiId=${{ secrets.TELEGRAM_API_ID }}" >> local.properties
          echo "apiHash=${{ secrets.TELEGRAM_API_HASH }}" >> local.properties
          
          MAPS_KEY="${{ secrets.MAPS_API_KEY }}"
          [ -z "$MAPS_KEY" ] && MAPS_KEY="AIzaSyDummyKey_Linkit"
          echo "mapsApiKey=$MAPS_KEY" >> local.properties

      - name: Patch Package Name & arm64 Only
        run: |
          # تعديل الـ Package Name وحصر المعمارية بـ arm64
          [ -f "gradle.properties" ] && sed -i 's/^APP_PACKAGE=.*/APP_PACKAGE=org.linkit.octogram/' gradle.properties || true
          sed -i "s/include 'armeabi-v7a', 'arm64-v8a', 'x86', 'x86_64'/include 'arm64-v8a'/" TMessagesProj_App/build.gradle
          
          TARGET_JSON="TMessagesProj_App/google-services.json"
          if [ -f "$TARGET_JSON" ]; then
            sed -i 's/"package_name": "[^"]*"/"package_name": "org.linkit.octogram"/g' "$TARGET_JSON"
          fi
          
          [ -f "gradle.properties" ] && sed -i '/android.enableR8/d' gradle.properties || true

      - name: Build with Gradle (arm64 Only)
        run: |
          ./gradlew :TMessagesProj_App:assembleRelease \
            --no-configuration-cache \
            -Pandroid.antlr.arguments="-w" \
            -Dorg.gradle.project.android.ndk.cflags="-w" \
            -Dorg.gradle.project.android.ndk.cppflags="-w" \
            -Pandroid.injected.testOnly=false

      - name: Upload arm64-v8a build apk
        uses: actions/upload-artifact@v7
        with:
          name: OctoGram-arm64-apk
          path: TMessagesProj_App/build/outputs/apk/release/*-arm64-v8a.apk
          archive: false
